<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Your Loyalty Card</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0b0b0f;--bg2:#131319;--bg3:#1c1c24;--border:#25252d;--text:#e8e8f0;--text2:#9999aa;--gold:#f5a623;--gold2:#ffc95a;--success:#00b86f;--error:#ff4561;}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
.app{max-width:420px;margin:0 auto;padding:20px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;margin-bottom:20px}
.biz-emoji{font-size:2.5rem;text-align:center;margin-bottom:10px}
.biz-name{font-size:1.3rem;font-weight:700;text-align:center;margin-bottom:4px}
.biz-sub{font-size:.8rem;color:var(--text2);text-align:center;margin-bottom:24px}
.stamps{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:20px}
.stamp{width:40px;height:40px;border-radius:50%;border:2px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.stamp.filled{background:var(--gold);border-color:var(--gold)}
.reward-text{text-align:center;font-size:.78rem;color:var(--text2);margin-bottom:24px}
/* Phone row */
.phone-row{display:flex;gap:8px;margin-bottom:10px}
.country-select{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 10px;color:var(--text);font-family:'Inter',sans-serif;font-size:.85rem;outline:none;transition:.15s;flex-shrink:0;width:110px;cursor:pointer}
.country-select:focus{border-color:rgba(245,166,35,.4)}
.phone-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'Inter',sans-serif;font-size:.9rem;outline:none;transition:.15s}
.phone-input:focus{border-color:rgba(245,166,35,.4)}
.phone-input.error{border-color:var(--error)}
.phone-hint{font-size:.68rem;color:var(--text2);margin:-6px 0 8px 0;padding-left:2px}
.inp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'Inter',sans-serif;font-size:.9rem;outline:none;margin-bottom:10px;transition:.15s}
.inp:focus{border-color:rgba(245,166,35,.4)}
.inp-label{font-size:.7rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text2);margin-bottom:4px;margin-top:4px}
.inp-sub{font-size:.65rem;color:var(--text2);margin:-6px 0 10px 0}
.wallet-choice{display:none;flex-direction:column;gap:10px;width:100%;margin-bottom:10px}
.wallet-choice.show{display:flex}
.wallet-choice-title{font-size:.78rem;color:var(--text2);text-align:center;margin-bottom:2px}
.btn-google{width:100%;background:#fff;border:none;border-radius:10px;padding:13px;color:#111;font-family:'Inter',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-google:hover{background:#f0f0f0}
.btn-apple{width:100%;background:#000;border:1px solid #333;border-radius:10px;padding:13px;color:#fff;font-family:'Inter',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-apple:hover{background:#111}
.btn{width:100%;background:var(--gold);border:none;border-radius:10px;padding:13px;color:#111;font-family:'Inter',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:.15s}
.btn:hover{background:var(--gold2)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.powered{font-size:.65rem;color:var(--text2);text-align:center;margin-top:16px}
.msg{font-size:.8rem;text-align:center;min-height:20px;margin-bottom:8px}
.msg.ok{color:var(--success)}.msg.err{color:var(--error)}
.demo-bar{position:fixed;top:0;left:0;right:0;background:#1a1030;border-bottom:1px solid var(--border);padding:8px 16px;font-size:.72rem;color:var(--gold);text-align:center;z-index:100}
.divider{display:flex;align-items:center;gap:10px;margin:4px 0 6px}
.divider-line{flex:1;height:1px;background:var(--border)}
.divider-text{font-size:.7rem;color:var(--text2)}
/* Card added success state */
.card-added{background:var(--bg2);border:1px solid var(--success);border-radius:20px;padding:28px;width:100%;margin-bottom:20px;text-align:center}
.card-added-icon{font-size:3rem;margin-bottom:12px}
.card-added-title{font-size:1.1rem;font-weight:700;color:var(--success);margin-bottom:6px}
.card-added-sub{font-size:.8rem;color:var(--text2);line-height:1.5}
.card-added-name{font-size:.95rem;font-weight:600;color:var(--text);margin:10px 0 4px}
.card-added-badge{display:inline-flex;align-items:center;gap:5px;background:#00b86f18;border:1px solid #00b86f40;border-radius:100px;padding:3px 10px;font-size:.7rem;color:var(--success);margin-bottom:16px}
.shown-on-card{font-size:.65rem;color:var(--text2);background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:2px 7px;margin-left:5px;vertical-align:middle}
</style>
</head>
<body>
<div id="app" class="app"><div style="color:var(--text2);font-size:.85rem">Loading...</div></div>
<script>
const API='https://loyalpass-backend-production-5c8a.up.railway.app';
const BIZ={
  'cafe-carmel':  {name:'Café Carmel',  emoji:'🍽️',max:10,reward:'Buy 9 meals → 10th FREE + fries & drink'},
  'ofeh-yisraeli':{name:'Ofeh Yisraeli',emoji:'🥐',max:10,reward:'Buy 9 items → 10th FREE'},
  'powerup-gym':  {name:'PowerUp Gym',  emoji:'🏋️',max:10,reward:'10 visits → FREE month'},
  'teva-hashuk':  {name:'Teva HaShuk', emoji:'🌿',max:10,reward:'10 purchases → 20% OFF'}
};

// Country dial codes + exact digit counts
const COUNTRIES=[
  {code:'+972',flag:'🇮🇱',name:'Israel',  digits:9, placeholder:'50 123 4567'},
  {code:'+1',  flag:'🇺🇸',name:'USA/CA',  digits:10,placeholder:'212 555 1234'},
  {code:'+44', flag:'🇬🇧',name:'UK',      digits:10,placeholder:'7700 900123'},
  {code:'+33', flag:'🇫🇷',name:'France',  digits:9, placeholder:'6 12 34 56 78'},
  {code:'+49', flag:'🇩🇪',name:'Germany', digits:10,placeholder:'151 1234 5678'},
  {code:'+39', flag:'🇮🇹',name:'Italy',   digits:10,placeholder:'320 123 4567'},
  {code:'+34', flag:'🇪🇸',name:'Spain',   digits:9, placeholder:'612 345 678'},
  {code:'+31', flag:'🇳🇱',name:'Netherlands',digits:9,placeholder:'6 12345678'},
  {code:'+41', flag:'🇨🇭',name:'Switzerland',digits:9,placeholder:'78 123 45 67'},
  {code:'+971',flag:'🇦🇪',name:'UAE',     digits:9, placeholder:'50 123 4567'},
  {code:'+966',flag:'🇸🇦',name:'Saudi',   digits:9, placeholder:'50 123 4567'},
  {code:'+20', flag:'🇪🇬',name:'Egypt',   digits:10,placeholder:'100 123 4567'},
  {code:'+90', flag:'🇹🇷',name:'Turkey',  digits:10,placeholder:'501 234 5678'},
  {code:'+7',  flag:'🇷🇺',name:'Russia',  digits:10,placeholder:'912 345 6789'},
  {code:'+86', flag:'🇨🇳',name:'China',   digits:11,placeholder:'138 0013 8000'},
  {code:'+81', flag:'🇯🇵',name:'Japan',   digits:10,placeholder:'90 1234 5678'},
  {code:'+82', flag:'🇰🇷',name:'Korea',   digits:9, placeholder:'10 1234 5678'},
  {code:'+55', flag:'🇧🇷',name:'Brazil',  digits:11,placeholder:'11 9 1234 5678'},
  {code:'+52', flag:'🇲🇽',name:'Mexico',  digits:10,placeholder:'55 1234 5678'},
  {code:'+54', flag:'🇦🇷',name:'Argentina',digits:10,placeholder:'11 2345 6789'},
];

const p=new URLSearchParams(location.search),bizId=p.get('biz'),biz=BIZ[bizId]||BIZ['cafe-carmel'];
let cName='',cPhone='',cardAdded=false;

function getCountry(){
  const sel=document.getElementById('country-sel');
  return sel?COUNTRIES.find(c=>c.code===sel.value)||COUNTRIES[0]:COUNTRIES[0];
}

function card(s){
  s=s||0;
  const dots=Array.from({length:biz.max},(_,i)=>'<div class="stamp '+(i<s?'filled':'')+'">'+( i<s?'★':'')+' </div>').join('');
  return '<div class="card"><div class="biz-emoji">'+biz.emoji+'</div><div class="biz-name">'+biz.name+'</div><div class="biz-sub">Your digital loyalty card</div><div class="stamps">'+dots+'</div><div class="reward-text">'+biz.reward+'</div></div>';
}

function countryOptions(){
  return COUNTRIES.map(c=>'<option value="'+c.code+'"'+(c.code==='+972'?' selected':'')+'>'+c.flag+' '+c.code+'</option>').join('');
}

function form(){
  return '<div class="card">'+
    '<div style="font-size:.85rem;font-weight:600;margin-bottom:14px">Get your free loyalty card</div>'+
    '<div class="inp-label">Full Name <span class="shown-on-card">shown on card</span></div>'+
    '<input class="inp" id="n" placeholder="e.g. David Cohen" type="text" autocomplete="name"/>'+
    '<div class="inp-label" style="margin-top:6px">Phone Number</div>'+
    '<div class="phone-row">'+
      '<select class="country-select" id="country-sel" onchange="onCountryChange()">'+countryOptions()+'</select>'+
      '<input class="phone-input" id="ph" placeholder="50 123 4567" type="tel" inputmode="numeric" autocomplete="tel-national" oninput="onPhoneInput(this)"/>'+
    '</div>'+
    '<div class="phone-hint" id="ph-hint">🇮🇱 Israel · 9 digits required</div>'+
    '<div class="msg" id="msg"></div>'+
    '<div class="wallet-choice" id="wc">'+
      '<div class="wallet-choice-title">Choose where to save your card:</div>'+
      '<button class="btn-google" id="bg" onclick="gWallet()">📱 Add to Google Wallet</button>'+
      '<div class="divider"><div class="divider-line"></div><div class="divider-text">or</div><div class="divider-line"></div></div>'+
      '<button class="btn-apple" id="ba" onclick="aWallet()"> Add to Apple Wallet</button>'+
    '</div>'+
    '<button class="btn" id="jb" onclick="join()">Get my card →</button>'+
  '</div>'+
  '<div class="powered">✦ Powered by LoyalPass · loyalpass.co.il</div>';
}

function cardAddedScreen(name, wallet){
  return '<div class="card-added">'+
    '<div class="card-added-icon">✅</div>'+
    '<div class="card-added-title">Card Added Successfully!</div>'+
    '<div class="card-added-badge">✓ Active in '+wallet+'</div>'+
    '<div class="card-added-name">'+name+'</div>'+
    '<div class="card-added-sub">'+
      'Your <strong>'+biz.name+'</strong> loyalty card is now in your wallet.<br/>'+
      'Show it at checkout to collect stamps and earn rewards.'+
    '</div>'+
    '<div style="margin-top:20px;padding:14px;background:var(--bg3);border-radius:12px;font-size:.75rem;color:var(--text2)">'+
      '<div style="margin-bottom:6px;font-weight:600;color:var(--text)">Your reward:</div>'+
      biz.reward+
    '</div>'+
  '</div>'+
  '<div class="powered">✦ Powered by LoyalPass · loyalpass.co.il</div>';
}

function setMsg(t,ok){
  const m=document.getElementById('msg');
  if(!m)return;
  m.className='msg '+(ok?'ok':'err');
  m.textContent=t;
}

function onCountryChange(){
  const c=getCountry();
  const ph=document.getElementById('ph');
  const hint=document.getElementById('ph-hint');
  if(ph) ph.placeholder=c.placeholder;
  if(hint) hint.textContent=c.flag+' '+c.name+' · '+c.digits+' digits required';
  if(ph) ph.value='';
  if(ph) ph.classList.remove('error');
}

function onPhoneInput(el){
  // Strip non-digits
  const digits=el.value.replace(/\D/g,'');
  el.value=digits;
  const c=getCountry();
  if(digits.length>c.digits) el.value=digits.substring(0,c.digits);
  el.classList.toggle('error', el.value.length>0 && el.value.length!==c.digits);
  const hint=document.getElementById('ph-hint');
  if(hint){
    const rem=c.digits-el.value.length;
    hint.textContent=el.value.length===c.digits
      ?'✓ '+c.flag+' '+c.name+' · looks good'
      :c.flag+' '+c.name+' · '+c.digits+' digits required'+(el.value.length>0?' ('+rem+' more)':'');
    hint.style.color=el.value.length===c.digits?'var(--success)':'var(--text2)';
  }
}

function join(){
  const n=document.getElementById('n').value.trim();
  const ph=document.getElementById('ph').value.trim();
  const c=getCountry();
  if(!n){setMsg('Please enter your full name',false);document.getElementById('n').focus();return;}
  if(n.split(' ').filter(w=>w).length<2){setMsg('Please enter your full name (first + last)',false);document.getElementById('n').focus();return;}
  if(!ph||ph.length!==c.digits){setMsg('Please enter a valid '+c.digits+'-digit phone number',false);document.getElementById('ph').focus();return;}
  cName=n;
  cPhone=c.code+ph; // include country code in stored phone
  document.getElementById('jb').style.display='none';
  document.getElementById('wc').classList.add('show');
  document.getElementById('n').disabled=true;
  document.getElementById('ph').disabled=true;
  document.getElementById('country-sel').disabled=true;
  setMsg('✓ Ready! Choose your wallet:',true);
}

function showCardAdded(wallet){
  cardAdded=true;
  const app=document.getElementById('app');
  app.innerHTML=card(0)+cardAddedScreen(cName, wallet);
}

async function gWallet(){
  const btn=document.getElementById('bg');
  btn.disabled=true;btn.textContent='Creating...';
  setMsg('Creating Google Wallet pass...',true);
  try{
    const r=await fetch(API+'/api/pass/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:cName,phone:cPhone,businessId:bizId||'cafe-carmel'})});
    const d=await r.json();
    if(d.googleWalletUrl){
      setMsg('Opening Google Wallet...',true);
      showCardAdded('Google Wallet');
      setTimeout(()=>location.href=d.googleWalletUrl,800);
    }else{
      setMsg(d.error||'Error',false);btn.disabled=false;btn.textContent='📱 Add to Google Wallet';
    }
  }catch(e){setMsg('Connection error. Try again.',false);btn.disabled=false;btn.textContent='📱 Add to Google Wallet';}
}

async function aWallet(){
  const btn=document.getElementById('ba');
  const isIOS=/iPhone|iPad|iPod/.test(navigator.userAgent);
  btn.disabled=true;
  btn.textContent=isIOS?'Opening Wallet...':'Preparing pass...';
  setMsg(isIOS?'Opening Apple Wallet...':'Creating Apple Wallet pass...',true);
  if(isIOS){
    showCardAdded('Apple Wallet');
    setTimeout(()=>{
      const url=API+'/api/pass/apple/create?name='+encodeURIComponent(cName)+'&phone='+encodeURIComponent(cPhone)+'&businessId='+(bizId||'cafe-carmel');
      window.location.href=url;
    },400);
  }else{
    try{
      const r=await fetch(API+'/api/pass/apple/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:cName,phone:cPhone,businessId:bizId||'cafe-carmel'})});
      if(r.ok){
        const blob=await r.blob(),url=URL.createObjectURL(blob);
        showCardAdded('Apple Wallet');
        const a=document.createElement('a');a.href=url;a.download='loyalpass.pkpass';
        document.body.appendChild(a);a.click();
        setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
      }else{
        const d=await r.json().catch(()=>({error:'Server error'}));
        setMsg(d.error||'Error creating pass',false);
        btn.disabled=false;btn.textContent=' Add to Apple Wallet';
      }
    }catch(e){
      setMsg('Connection error. Try again.',false);
      btn.disabled=false;btn.textContent=' Add to Apple Wallet';
    }
  }
}

const app=document.getElementById('app');
if(!bizId){
  app.innerHTML='<div class="demo-bar">✦ DEMO MODE · loyalpass.co.il</div><div style="margin-top:48px;width:100%;max-width:420px">'+card(3)+form()+'</div>';
}else{
  app.innerHTML=card(0)+form();
}
</script>
</body>
</html>
