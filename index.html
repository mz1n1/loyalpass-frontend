<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Your Loyalty Card</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0b0b0f;--bg2:#131319;--bg3:#1c1c24;--border:#25252d;--text:#e8e8f0;--text2:#9999aa;--gold:#f5a623;--gold2:#ffc95a;--success:#00b86f;--error:#ff4561;}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
.app{max-width:420px;margin:0 auto;padding:20px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;margin-bottom:20px}
.biz-emoji{font-size:2.5rem;text-align:center;margin-bottom:10px}
.biz-name{font-size:1.3rem;font-weight:700;text-align:center;margin-bottom:4px}
.biz-sub{font-size:.8rem;color:var(--text2);text-align:center;margin-bottom:24px}
.stamps{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:20px}
.stamp{width:40px;height:40px;border-radius:50%;border:2px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.stamp.filled{background:var(--gold);border-color:var(--gold)}
.reward-text{text-align:center;font-size:.78rem;color:var(--text2);margin-bottom:24px}
.inp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'Inter',sans-serif;font-size:.9rem;outline:none;margin-bottom:10px;transition:.15s}
.inp:focus{border-color:rgba(245,166,35,.4)}
.btn{width:100%;background:var(--gold);border:none;border-radius:10px;padding:13px;color:#111;font-family:'Inter',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:.15s}
.btn:hover{background:var(--gold2)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.powered{font-size:.65rem;color:var(--text2);text-align:center;margin-top:16px}
.msg{font-size:.8rem;text-align:center;min-height:20px;margin-bottom:8px}
.msg.ok{color:var(--success)}.msg.err{color:var(--error)}
.demo-bar{position:fixed;top:0;left:0;right:0;background:#1a1030;border-bottom:1px solid var(--border);padding:8px 16px;font-size:.72rem;color:var(--gold);text-align:center;z-index:100}
</style>
</head>
<body>
<div id="app" class="app"><div style="color:var(--text2);font-size:.85rem">Loading...</div></div>

<script>
const API_BASE = window.LP_API || 'https://loyalpass-backend-production-5c8a.up.railway.app';

const BIZ_MAP = {
  'cafe-carmel':   {name:'Café Carmel',   emoji:'🍽️', color:'#1a1030', max:10, reward:'Buy 9 meals → 10th FREE + fries & drink'},
  'ofeh-yisraeli': {name:'Ofeh Yisraeli', emoji:'🥐', color:'#2c1206', max:10, reward:'Buy 9 items → 10th FREE'},
  'powerup-gym':   {name:'PowerUp Gym',   emoji:'🏋️', color:'#061a10', max:10, reward:'10 visits → FREE month'},
  'teva-hashuk':   {name:'Teva HaShuk',   emoji:'🌿', color:'#062030', max:10, reward:'10 purchases → 20% OFF'},
};

const params = new URLSearchParams(window.location.search);
const bizId  = params.get('biz');
const isDemo = params.get('demo') === 'true' || !bizId;
const biz    = BIZ_MAP[bizId] || BIZ_MAP['cafe-carmel'];
let stamps   = 0;

function renderCard(s) {
  stamps = s || 0;
  const filled = Array.from({length:biz.max}, (_,i) =>
    `<div class="stamp ${i < stamps ? 'filled' : ''}">${i < stamps ? '★' : ''}</div>`
  ).join('');
  return `
    <div class="card">
      <div class="biz-emoji">${biz.emoji}</div>
      <div class="biz-name">${biz.name}</div>
      <div class="biz-sub">Your digital loyalty card</div>
      <div class="stamps">${filled}</div>
      <div class="reward-text">${biz.reward}</div>
    </div>
  `;
}

function renderForm() {
  return `
    <div class="card" id="form-card">
      <div style="font-size:.85rem;font-weight:600;margin-bottom:14px">Get your free loyalty card</div>
      <input class="inp" id="inp-name" placeholder="Your name" type="text"/>
      <input class="inp" id="inp-phone" placeholder="Phone number (e.g. 0501234567)" type="tel"/>
      <div class="msg" id="msg"></div>
      <button class="btn" id="join-btn" onclick="joinCard()">Get my card →</button>
    </div>
    <div class="powered">✦ Powered by LoyalPass · loyalpass.co.il</div>
  `;
}

async function joinCard() {
  const name  = document.getElementById('inp-name')?.value?.trim();
  const phone = document.getElementById('inp-phone')?.value?.trim();
  const msg   = document.getElementById('msg');
  const btn   = document.getElementById('join-btn');
  if (!name || !phone) { msg.className='msg err'; msg.textContent='Please enter name and phone'; return; }
  btn.disabled = true;
  msg.className='msg'; msg.textContent='Creating your card...';
  try {
    const r = await fetch(API_BASE + '/api/pass/create', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name, phone, businessId: bizId || 'cafe-carmel'})
    });
    const d = await r.json();
    if (d.googleWalletUrl) {
      msg.className='msg ok'; msg.textContent='Card ready! Opening Google Wallet...';
      setTimeout(() => { window.location.href = d.googleWalletUrl; }, 800);
    } else if (d.error) {
      msg.className='msg err'; msg.textContent = d.error;
      btn.disabled = false;
    }
  } catch(e) {
    msg.className='msg err'; msg.textContent = 'Connection error. Try again.';
    btn.disabled = false;
  }
}

// Init
const app = document.getElementById('app');
if (isDemo) {
  app.innerHTML = `<div class="demo-bar">✦ DEMO MODE — loyalpass.co.il</div>`
    + `<div style="margin-top:48px;width:100%;max-width:420px">`
    + renderCard(3)
    + renderForm()
    + `</div>`;
} else {
  app.innerHTML = renderCard(0) + renderForm();
}
</script>
</body>
</html>
